<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>地下三维管网 AR 查看</title>
    <link rel="stylesheet" href="./style.css">
    <!-- A-Frame 和 AR.js 库 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    
    <!-- 自定义 A-Frame 组件 -->
    <script>
        AFRAME.registerComponent('line-grid', {
            schema: {
                size: { type: 'number', default: 100 },
                divisions: { type: 'number', default: 100 },
                colorCenterLine: { type: 'color', default: '#44ff44' },
                colorGrid: { type: 'color', default: '#222222' }
            },
            
            init: function() {
                const data = this.data;
                const size = data.size;
                const divisions = data.divisions;
                const step = size / divisions;
                
                const group = new THREE.Group();
                
                // 创建中心线（XY平面）
                const centerMaterial = new THREE.LineBasicMaterial({ color: data.colorCenterLine });
                const gridMaterial = new THREE.LineBasicMaterial({ color: data.colorGrid });
                
                // 绘制 X 方向的线
                for (let i = 0; i <= divisions; i++) {
                    const z = -size / 2 + i * step;
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(-size / 2, 0, z),
                        new THREE.Vector3(size / 2, 0, z)
                    ]);
                    const line = new THREE.Line(geometry, i === divisions / 2 ? centerMaterial : gridMaterial);
                    group.add(line);
                }
                
                // 绘制 Z 方向的线
                for (let i = 0; i <= divisions; i++) {
                    const x = -size / 2 + i * step;
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(x, 0, -size / 2),
                        new THREE.Vector3(x, 0, size / 2)
                    ]);
                    const line = new THREE.Line(geometry, i === divisions / 2 ? centerMaterial : gridMaterial);
                    group.add(line);
                }
                
                this.el.setObject3D('mesh', group);
            }
        });
    </script>
</head>
<body>
    <div id="app">
        <!-- A-Frame AR 场景 -->
        <a-scene 
            vr-mode-ui="enabled: false"
            arjs="detectionMode: mono_and_matrix; matrixCodeType: 3x3; sourceType: webcam; trackingMethod: best;"
            id="ar-scene">
            
            <!-- Hiro 标记 - 配置为识别成功后保持固定 -->
            <a-marker 
                type="hiro" 
                id="hiro-marker" 
                emitevents="true"
                preset="hiro"
                smooth="true"
                smoothCount="5"
                smoothTolerance="0.01"
                smoothThreshold="2">
                <a-entity id="ar-content"></a-entity>
            </a-marker>
            
            <!-- 相机 -->
            <a-entity camera look-controls="enabled: false"></a-entity>
        </a-scene>
        
        <!-- 左上角综合参数显示面板 -->
        <div id="sensor-panel" class="hidden">
            <div class="panel-title">传感器状态</div>
            <div class="sensor-status">
                <div class="status-item">GPS: <span id="gps-status">等待...</span></div>
                <div class="status-item">陀螺仪：<span id="gyro-status">等待...</span></div>
            </div>
            
            <div class="data-section">
                <div class="section-title">GPS 精度</div>
                <div class="data-item">纬度：<span id="lat-value">--</span></div>
                <div class="data-item">经度：<span id="lng-value">--</span></div>
                <div class="data-item">定位误差：<span id="gps-accuracy">--</span></div>
            </div>
            
            <div class="data-section">
                <div class="section-title">旋转角度</div>
                <div class="data-item">X 轴：<span id="rot-x">0.00°</span></div>
                <div class="data-item">Y 轴：<span id="rot-y">0.00°</span></div>
                <div class="data-item">Z 轴：<span id="rot-z">0.00°</span></div>
            </div>
        </div>
        
        <div id="qr-overlay">
            <div id="qr-frame"></div>
            <div id="qr-text">请扫描二维码初始化</div>
        </div>
        
        <div id="debug-panel" class="hidden">
            <button id="debug-reset-rotation">重置旋转</button>
            <button id="debug-toggle-gyro">切换陀螺仪</button>
            <div id="gyro-data">陀螺仪：α=0 β=0 γ=0</div>
        </div>
        
        <div id="offset-panel" class="hidden">
            <div class="panel-title">视角偏移控制</div>
            <div class="offset-grid">
                <div></div>
                <button id="offset-forward">↑北</button>
                <div></div>
                <button id="offset-left">←西</button>
                <button id="offset-reset">重置</button>
                <button id="offset-right">东→</button>
                <div></div>
                <button id="offset-back">↓南</button>
                <div></div>
            </div>
            <div class="offset-values">
                <span>X: <span id="offset-x">0</span></span>
                <span>Y: <span id="offset-y">0</span></span>
                <span>Z: <span id="offset-z">0</span></span>
            </div>
        </div>
        
        <div id="pipe-info" class="hidden">
            <div id="pipe-info-close">×</div>
            <h3>管线信息</h3>
            <div id="pipe-info-content"></div>
        </div>
        
        <div id="start-screen">
            <p class="start-tip">请用户竖直拿稳手机后点击按钮</p>
            <button id="start-btn">开始 AR 体验</button>
        </div>
    </div>
    
    <script type="module" src="./main.js"></script>
</body>
</html>
